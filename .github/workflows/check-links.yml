name: Check Links

on:
  workflow_dispatch:
  schedule:
    - cron: "00 18 * * 0"

jobs:
  check-links:
    runs-on: ubuntu-slim
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check links
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --root-dir "${{ github.workspace }}"
            --verbose
            --no-progress
            './**/*.md'
            './**/*.html'
            './config.toml'
          fail: false
          jobSummary: true

      - name: Create issue
        if: steps.lychee.outputs.exit_code != 0
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue create --title "Broken links report" --body-file ./lychee/out.md
