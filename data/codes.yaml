- title: Traveltime and Ray Tracing
  resources:
  - name: TauP
    url: https://www.seis.sc.edu/taup/
    description: Calculate traveltimes, ray parameters, ray paths, reflection points,
      piercing points of seismic phases, supporting custom Earth models
    links:
    - name: Tutorials (in Chinese)
      url: https://seismo-learn.org/software/taup/
  - name: obspy.taup
    url: https://docs.obspy.org/packages/obspy.taup.html
    description: TauP written in Python
  - name: ANISOtime
    url: http://www-solid.eps.s.u-tokyo.ac.jp/~dsm/anisotime.html
    description: Traveltime calculation for transversely isotropic (TI) spherically
      symmetric models
    links:
    - name: GitHub
      url: https://github.com/UT-GlobalSeismology/anisotime
  - name: Cake
    url: https://pyrocko.org
    description: Traveltime calculation software, written in Python.
  - name: fast_methods
    url: https://github.com/jvgomez/fast_methods
    description: N-Dimensional Fast Methodswritten in C++
  - name: FM3D
    url: http://rses.anu.edu.au/seismology/soft/fmmcode
    description: 3D traveltime calculation using Fast Marching Method in spherical
      coordinates written in Fortran
    links:
    - name: iEarth
      url: http://www.iearth.edu.au/codes/3Dfastmarching/
  - name: 'Lapo Boschi: Software'
    url: http://hestia.lgs.jussieu.fr/~boschil/downloads.html
    description: Surface Wave Ray Tracing with Azimuthal Anisotropy
    links:
    - name: SPICE
      url: http://www.spice-rtn.org/library/software/traceswani/softwarerelease.2006-11-16.2126060784.html
  - name: pykonal
    url: https://github.com/malcolmw/pykonal
    description: 2D/3D traveltime calculator using Fast Marching Method for eikonal
      equation in Cartesian and spherical coordinates
  - name: pySeismicFMM
    url: https://github.com/gozwei/pySeismicFMM
    description: 2D/3D travel time calculation in based on the Fast Marching Method
      written in Python
  - name: pyekfmm
    url: https://github.com/aaspip/pyekfmm
    description: A python package for 3D fast-marching-based traveltime calculation
      and its applications in seismology
  - name: RSTT
    url: https://www.sandia.gov/rstt/
    description: Regional Seismic Travel Time
  - name: scikit-fmm
    url: https://github.com/scikit-fmm/scikit-fmm
    description: Fast marching method in Cartesian coordinates written in Python
  - name: iaspei-tau traveltime table package
    links:
    - name: Arthur Snoke's version at IASPEI
      url: http://www.iaspei.org/downloads
    - name: Arthur Snoke's version at IRIS
      url: https://seiscode.iris.washington.edu/projects/iaspei-tau
    - name: B.L.N. Kennett and Ray Buland's version
      url: http://rses.anu.edu.au/seismology/soft/ttsoft.html
    - name: A revised version
      url: https://github.com/seisman/TravelTimeEllipcityCorrection
    - name: George Helffrich's version
      url: https://members.elsi.jp/~george/sac-bugs.html#ttimes
  - name: EllipticiPy
    url: https://github.com/StuartJRussell/EllipticiPy
    description: Python package for the calculation of ellipticity corrections for
      seismic waves.
- title: Synthetic Seismograms
  groups:
  - title: Ray Theory for 1D Layered Earth
    resources:
    - name: aser
      url: http://www.eas.slu.edu/People/LZhu/home.html
      description: Calculate synthetic seismograms based on Generalized Ray Theory
    - name: Asymptotic ray theory
      description: Collection of programs for calculating theorectical seismogram,
        receiver function, surface wave dispersion curve et al.
      links:
      - name: CPS330
        url: http://www.eas.slu.edu/eqc/eqccps.html
      - name: A tutorial (in Chinese)
        url: https://seismo-learn.org/software/cps/
    - name: CRT
      url: http://seis.karlov.mff.cuni.cz/software/sw3dcd21/crt/crt.htm
      description: Complete ray tracing subroutine package
    - name: Generalized ray
      description: Collection of programs for calculating theorectical seismogram,
        receiver function, surface wave dispersion curve et al.
      links:
      - name: CPS330
        url: http://www.eas.slu.edu/eqc/eqccps.html
      - name: A tutorial (in Chinese)
        url: https://seismo-learn.org/software/cps/
    - name: Ray theory
      url: http://www.spice-rtn.org/library/software/Raytheory.html
      description: Ray-theoretical approach to the calculation of synthetic seismograms
        in global Earth models
    - name: WKBJ method
      links:
      - name: seisan
        url: http://seisan.info
      - name: 'Seismology at GEUS: Seismological software'
        url: http://seis.geus.net
    - name: RaySum
      url: https://home.cc.umanitoba.ca/~frederik/Software/
      description: Ray-theoretical modelling of teleseismic waves in dipping, anisotropic
        structures
    - name: PyRaySum
      url: https://github.com/paudetseis/PyRaysum
  - title: Reflectivity/Wavenumber Integration for 1D Layered Earth
    resources:
    - name: fk
      url: http://www.eas.slu.edu/People/LZhu/home.html
      description: Calculate synthetic seismograms in layered isotropic models using
        frequency-wavenumber method
      links:
      - name: A tutorial (in Chinese)
        url: https://seismo-learn.org/software/fk/
    - name: Discrete wavenumber method
      links:
      - name: seisan
        url: http://seisan.info
      - name: 'Seismology at GEUS: Seismological software'
        url: http://seis.geus.net
    - name: grtm
      url: https://github.com/YunyiQian/grtm
      description: The generalized reflection and transmission coefficient method
    - name: grtm (VTI media)
      url: https://github.com/Xindingfang/grtm
      description: Calculate synthetic seismograms in stratified vertically transversely
        isotropic media using the generalized reflection and transmission coefficient
        method
    - name: multitel3
      url: https://github.com/YunyiQian/multitel3
      description: A hybrid method of ray theory and haskell matrix to calculate teleseismic
        body wave Green's functions in RTZ components
    - name: QSEIS
      url: https://www.gfz-potsdam.de/en/section/physics-of-earthquakes-and-volcanoes/infrastructure/tool-development-lab/
      description: Calculating synthetic seismograms based on a layered viscoelastic
        half-space earth model
    - name: ANIMATIVITY
      url: https://github.com/RUseismology/ANIMATIVITY
      description: Reflectivity Algorithm for body Wave propagation through layered
        anisotropic media written in MATLAB
    - name: Reflectivity method
      url: http://www.spice-rtn.org/library/software/ERZSOL3.html
      description: Calculating the response of a layered uniform solid layers to excitation
        by a point moment tensor source using the reflectivity method
    - name: rf_respknt
      url: https://github.com/Chuanming-Liu/rf_respknt
      description: Reflection matrix approach to computing the seismic response of
        a cylindrically symmetric medium
    - name: RMATRIX
      url: http://seis.karlov.mff.cuni.cz/software/sw3dcd22/rmatrix/rmatrix.htm
      description: Calculate the frequency-dependent transmission coefficients written
